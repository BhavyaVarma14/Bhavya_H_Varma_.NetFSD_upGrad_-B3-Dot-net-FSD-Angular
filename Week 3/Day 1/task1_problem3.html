<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List with Add to Cart Counter</title>
    <style>
        .header{
            background-color: blue;
            color: azure;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 10;
            font-style: italic;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            font-size: xx-large;
            padding: 20px;
            margin-left: 10%;
            margin-right: 10%;
            height: 25%;
        }
        .container{
            display: grid;
            grid-template-columns: repeat(3,1fr);
            grid-template-rows: auto;
            gap: 15px;
            background-color: beige;
            padding: 5%;
            border: 1px solid black;
            border-radius: 20px;
            margin-left: 10%;
            margin-right: 10%;
        }
        .div1{
            border: 2px solid brown;
            border-radius: 10px;
            padding: 20px;
            font-family: 'Times New Roman', Times, serif;
            background-color: bisque;
            font-size: medium;
        }
        h3{
            color: chocolate;
            font-style: italic;
        }
        button{
            border: 1px solid sienna;
            color: slateblue;
            background-color: azure;
            font-weight: bolder;
            font-family: 'Times New Roman', Times, serif;
        }
        button:hover{
            background-color: silver
        }
        .Footer{
            background-color: red;
            color: azure;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 10;
            font-style: italic;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            font-size: xx-large;
            padding: 20px;
            margin-left: 10%;
            margin-right: 10%;
            height: 25%;
        }
    </style>
</head>
<body>
    <header class="header">
        Bharat Mart
    </header>
    <br>
    <div class="container">
        <div class="div1">
            <h3>MackBook</h3>
             Rs 100000
            <button>Add to Cart</button>
        <p class="p1"></p>
        </div>
        <div class="div1">
            <h3>Iphone</h3>
             Rs 90000
            <button>Add to Cart</button>
        <p class="p1"></p>
        </div>
        <div class="div1">
            <h3>Washing Machine</h3>
             Rs 30000
            <button>Add to Cart</button>
        <p class="p1"></p>
        </div>
        <div class="div1">
            <h3>LED TV</h3>
             Rs 50000
            <button>Add to Cart</button>
        <p class="p1"></p>
        </div>
        <div class="div1">
            <h3>Cooler</h3>
             Rs 20000
            <button>Add to Cart</button>
        <p class="p1"></p>
        </div>
        <div class="div1">
            <h3>Mixer Grinder</h3>
             Rs 10000
            <button>Add to Cart</button>
        <p class="p1"></p>
        </div>
    </div>
    <footer class="Footer">
        Cart Counter : 
    </footer>
    <script src="https://code.jquery.com/jquery-3.6.1.min.js"></script>
    <script>
        $(document).ready(function(){
            let count = 0;
            $(".div1 button").click(function () {
                count++;
               $(".Footer").text("Cart Counter : " + count);
               $(this).siblings("p").css("color","green");
               $(this).siblings("p").append("Product Added to cart").append("<br>");
            });
        });
    </script>
</body>
</html>
