<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h1>Generating Dynamic List</h1>
<hr/>
<input type="button" value="Load Cities" onclick="AddCity()"  />
<hr/>
<ul id="list1">
</ul>
<script>
function AddCity()
{
    let citiesArray = ["Hyd", "Chennai", "Goa", "Kolkata", "Mumbai", "Pune"];
    let l1=document.getElementById("list1");
    l1.innerHTML="";
    for(let city of citiesArray)
    {
    // code to add to list
        let li=document.createElement("li");
        li.innerText=city
        l1.appendChild(li)
    }
}

</script>
    
</body>
</html>
